name: infrastructure CICD
run-name: apply infrastructure changes to cloud-dev
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  plan-dev:
    runs-on: ubuntu-latest
    environment:
      name: google_cloud
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.10.5
      - name: Setup GCP credentials
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_DEV_EDITOR }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_DEV_EDITOR }}
          project_id: ${{ vars.GCP_PROJECT_ID_DEV }}
      - name: Terraform Init
        run: terraform init -migrate-state -force-copy
        working-directory: infrastructure/dev
      - name: Terraform Plan
        run: terraform plan
        working-directory: infrastructure/dev
  apply-dev:
    runs-on: ubuntu-latest
    needs: plan-dev
    environment:
      name: google_cloud
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.10.5
      - name: Setup GCP credentials
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_DEV_EDITOR }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_DEV_EDITOR }}
          project_id: ${{ vars.GCP_PROJECT_ID_DEV }}
      - name: Terraform Init
        run: terraform init -migrate-state -force-copy
        working-directory: infrastructure/dev
      - name: Terraform Apply
        run: terraform apply --auto-approve
        working-directory: infrastructure/dev

  plan-prod:
    runs-on: ubuntu-latest
    environment:
      name: google_cloud_prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.10.5
      - name: Setup GCP credentials
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_PROD_EDITOR }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PROD_EDITOR }}
          project_id: ${{ vars.GCP_PROJECT_ID_PROD }}
      - name: Terraform Init
        run: terraform init -migrate-state -force-copy
        working-directory: infrastructure/prod
      - name: Terraform Plan
        run: terraform plan
        working-directory: infrastructure/prod
  apply-prod:
    runs-on: ubuntu-latest
    needs: plan-prod
    environment:
      name: google_cloud_prod
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.10.5
      - name: Setup GCP credentials
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_EDITOR }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_PROD_EDITOR }}
          project_id: ${{ vars.GCP_PROJECT_ID_PROD }}
      - name: Terraform Init
        run: terraform init -migrate-state -force-copy
        working-directory: infrastructure/prod
      - name: Terraform Apply
        env:
          TF_VAR_github_token: ${{ secrets.TOKEN_FOR_CLOUDBUILD }}
        run: terraform apply --auto-approve
        working-directory: infrastructure/prod