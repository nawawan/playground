name: frontend CICD
run-name: deploy frontend app to cloudflare workers
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - "backend/**"
      - "infrastructure/**"
      - "README.md"
      - ".github/**"
      - ".gitignore"
      - "cloudbuild"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: install cargo
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - run: cd frontend && npm ci
      - name: Run linter
        run: cd frontend && npm run lint
      - name: Run rustfmt
        run: cd frontend/src/maze-creator/wasm && cargo fmt -- --check
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: install cargo
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cd frontend/src/maze-creator/wasm && cargo test
  build:
    needs: [test]
    runs-on: [ubuntu-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: install cargo
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - run: cd frontend/src/maze-creator/wasm && rustup target add wasm32-unknown-unknown && cargo install wasm-pack
      - run: cd frontend/src/maze-creator/wasm && LOG_LEVEL=Info wasm-pack build --target bundler --out-dir ../wasm/pkg
      - run: cd frontend && npm ci && npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maze-creator-frontend
          path: frontend/dist
          retention-days: 1
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: cloudflare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - run: npm install wrangler -g
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: maze-creator-frontend
          path: frontend/dist
      - name: Deploy to Cloudflare Workers
        run: cd frontend && npm ci && npm run preview
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID}}