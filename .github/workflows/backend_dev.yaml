name: Backend CICD
run-name: deploy backend app to cloud run
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - frontend/**
      - "infrastructure/**"
      - "README.md"
      - ".github/**"
      - ".gitignore"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: install cargo
        uses: dtolnay/rust-toolchain@stable
      - name: Run clippy
        run: cargo clippy
        working-directory: backend
      - name: Run rustfmt
        run: cargo fmt -- --check
        working-directory: backend
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d app_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: install cargo
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cd backend && SQLX_OFFLINE=true cargo test --workspace
