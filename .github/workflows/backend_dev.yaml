name: Backend CICD
run-name: deploy backend app to cloud run
on:
  workflow_dispatch:
  pull_request:
    paths-ignore:
      - frontend/**
      - "infrastructure/**"
      - "README.md"
      - ".github/**"
      - ".gitignore"
      - "cloudbuild.yaml"

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - id: check
        continue-on-error: true
        run: |
          MSG=$(git log -1 --format='%s')
          if echo "$MSG" | grep -qi 'skip ci'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
  lint:
    runs-on: ubuntu-latest
    needs: [check-skip]
    if: needs.check-skip.outputs.skip != 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: install cargo
        uses: dtolnay/rust-toolchain@stable
      - name: Run clippy
        run: cargo clippy
        working-directory: backend
      - name: Run rustfmt
        run: cargo fmt -- --check
        working-directory: backend
  test:
    runs-on: ubuntu-latest
    needs: [check-skip]
    if: needs.check-skip.outputs.skip != 'true'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d app_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/app_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: install cargo
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cd backend && SQLX_OFFLINE=true cargo test --workspace
  build:
    runs-on: ubuntu-latest
    needs: [check-skip, lint, test]
    if: needs.check-skip.outputs.skip != 'true'
    environment:
      name: google_cloud
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup GCP credentials
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER_DEV }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_DEV_EDITOR }}
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet
      - name: Build and push Docker image
        run: |
          cd backend && \
          IMAGE=asia-northeast1-docker.pkg.dev/nawawan/nawawan-prod-repository/nawawan-playground
          SHORT_SHA=${GITHUB_SHA::7}
          docker build \
            -t ${IMAGE}:${SHORT_SHA} \
            -t ${IMAGE}:latest \
            -f ./backend/Dockerfile \
            .
          docker push --all-tags ${IMAGE}
